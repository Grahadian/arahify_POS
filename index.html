<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <!-- ============================================================
         VIEWPORT: Prevents zoom (like a native app), fixes iOS issues
         ============================================================ -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- ============================================================
         PWA / App-like behavior
         ============================================================ -->
    <!-- iOS: run as fullscreen when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MSME Grow POS" />

    <!-- Android: fullscreen PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1E293B" />

    <!-- Disable phone number detection (iOS auto-links numbers) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS home screen icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>MSME Grow POS</title>

    <style>
      /* Prevent pull-to-refresh on mobile browsers */
      html {
        overscroll-behavior: none;
      }
      body {
        overscroll-behavior: none;
        /* Prevent text selection on double tap */
        -webkit-user-select: none;
        user-select: none;
        /* Allow text selection for inputs */
      }
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
      /* Prevent callout on long press */
      * {
        -webkit-touch-callout: none;
      }
      input, textarea {
        -webkit-touch-callout: default;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
